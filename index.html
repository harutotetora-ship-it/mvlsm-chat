<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVLsmチャット</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#1e1f22;
color:white;
}

#layout{
display:flex;
height:100vh;
}

#sidebar{
width:180px;
background:#2b2d31;
padding:10px;
box-sizing:border-box;
}

#sidebar button{
width:100%;
margin:5px 0;
padding:8px;
border:none;
border-radius:5px;
background:#40444b;
color:white;
cursor:pointer;
}

#sidebar button:hover{
background:#5865f2;
}

#chatArea{
flex:1;
display:flex;
flex-direction:column;
background:#313338;
}

#topBar{
padding:10px;
background:#2b2d31;
font-size:14px;
}

#messages{
flex:1;
overflow-y:auto;
padding:12px;
font-size:20px;
}

#messages div{
margin:10px 0;
line-height:1.6;
}

#messages b{
font-size:20px;
margin-right:6px;
}

.time{
font-size:12px;
color:#aaa;
margin-left:6px;
}

#messages img{
width:32px;
height:32px;
border-radius:50%;
vertical-align:middle;
margin-right:6px;
}

#inputArea{
display:flex;
padding:10px;
background:#2b2d31;
}

#msg{
flex:1;
padding:12px;
font-size:16px;
border:none;
border-radius:5px;
outline:none;
}

button{
margin-left:5px;
padding:10px;
border:none;
border-radius:5px;
background:#5865f2;
color:white;
cursor:pointer;
}

#login{
max-width:300px;
margin:100px auto;
background:#2b2d31;
padding:20px;
border-radius:10px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}
</style>
</head>

<body>

<div id="login">
<h2>MVLsmチャット</h2>
<input id="name" placeholder="名前">
<input type="password" id="pass" placeholder="パスワード">
<button id="loginBtn">入室</button>
<p id="error"></p>
</div>

<div id="layout" style="display:none;">

<div id="sidebar">
<button onclick="switchRoom('zatsudan')">⭐ 雑談</button>
<button onclick="switchRoom('bug')">🐛 バグ報告</button>
<button onclick="switchRoom('update')">📢 アップデート案</button>
</div>

<div id="chatArea">

<div id="topBar">
🟢 オンライン: <span id="online"></span>
</div>

<div id="messages"></div>

<div style="padding:5px;background:#2b2d31;">
<input id="iconUrl" placeholder="アイコンURL">
<button id="iconBtn">アイコン設定</button>
</div>

<div id="inputArea">
<input id="msg" placeholder="メッセージ">
<button id="sendBtn">送信</button>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getDatabase,
ref,
set,
push,
onValue,
onChildAdded,
onDisconnect,
off
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyARMFFYzOfZlptX72yn17AqCrXq3vyKK1s",
authDomain: "smtyatto.firebaseapp.com",
databaseURL: "https://smtyatto-default-rtdb.firebaseio.com",
projectId: "smtyatto",
storageBucket: "smtyatto.firebasestorage.app",
messagingSenderId: "720432898013",
appId: "1:720432898013:web:3fc9bb90082235ab506034"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const userId = crypto.randomUUID();
let username = "名無し";
let currentRoom = "zatsudan";
let users = {};
let chatRef = null;

/* ログイン */
document.getElementById("loginBtn").onclick = () => {

const pass = document.getElementById("pass").value;
username = document.getElementById("name").value || "名無し";

if(pass !== "MvLO"){
document.getElementById("error").innerText="パスワードミス";
return;
}

document.getElementById("login").style.display="none";
document.getElementById("layout").style.display="flex";

const uref = ref(db,"users/"+userId);

set(uref,{
name: username,
icon:"https://via.placeholder.com/30",
online:true
});

onDisconnect(uref).set({
name: username,
online:false
});

};

/* 部屋 */
window.switchRoom = function(room){

currentRoom = room;
document.getElementById("messages").innerHTML="";

if(chatRef) off(chatRef);

listenRoom();
};

/* アイコン */
document.getElementById("iconBtn").onclick = () => {
const url = document.getElementById("iconUrl").value;
if(!url) return;
set(ref(db,"users/"+userId+"/icon"), url);
};

/* 送信 */
function sendMsg(){

const msg = document.getElementById("msg").value;
if(!msg) return;

push(ref(db,"chat/"+currentRoom),{
userId,
name:username,
text:msg,
time:Date.now()
});

document.getElementById("msg").value="";
}

document.getElementById("sendBtn").onclick = sendMsg;

document.getElementById("msg").addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
e.preventDefault();
sendMsg();
}
});

/* オンライン */
onValue(ref(db,"users"),(snap)=>{

users = snap.val() || {};

let online="";
Object.keys(users).forEach(id=>{
if(users[id]?.online){
online += (users[id].name || "名無し") + " ";
}
});

document.getElementById("online").innerText = online;

});

/* 💬 受信（完全版時間付き） */
function listenRoom(){

chatRef = ref(db,"chat/"+currentRoom);

onChildAdded(chatRef,(snap)=>{

const d = snap.val();
const u = users?.[d.userId];

const icon = u?.icon || "https://via.placeholder.com/30";

const t = d.time ?? Date.now();
const date = new Date(t);

const yyyy = date.getFullYear();
const mm = String(date.getMonth()+1).padStart(2,"0");
const dd = String(date.getDate()).padStart(2,"0");
const hh = String(date.getHours()).padStart(2,"0");
const min = String(date.getMinutes()).padStart(2,"0");

const time = `${yyyy}/${mm}/${dd} ${hh}:${min}`;

const div = document.createElement("div");

div.innerHTML =
"<img src='"+icon+"'> " +
"<b>"+d.name+"</b> " +
"<span class='time'>"+time+"</span><br>" +
d.text;

document.getElementById("messages").appendChild(div);

});

}

listenRoom();

</script>

</body>
</html>
