<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVLsmチャット</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#1e1f22;
color:white;
}

#layout{display:none;height:100vh;flex-direction:column;}

#login{
max-width:300px;
margin:100px auto;
background:#2b2d31;
padding:20px;
border-radius:10px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

button{
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
}

#sendBtn{background:#5865f2;color:white;}

#messages{
flex:1;
overflow-y:auto;
padding:10px;
background:#313338;
}

.msg{
margin:8px 0;
padding:8px;
background:#40444b;
border-radius:8px;
}

.name{
font-size:12px;
color:#aaa;
}

.admin{
background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet);
-webkit-background-clip:text;
color:transparent;
}
</style>
</head>

<body>

<div id="login">
<h2>MVLsmチャット</h2>
<input id="name" placeholder="名前">
<input id="pass" type="password" placeholder="パスワード">
<button id="loginBtn">入室</button>
<p id="err"></p>
</div>

<div id="layout">
<div id="messages"></div>

<div style="display:flex;padding:10px;background:#2b2d31;">
<input id="msg" style="flex:1;" placeholder="メッセージ">
<button id="sendBtn">送信</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getDatabase,
ref,
push,
set,
onChildAdded,
remove
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyARMFFYZOfZlptX72yn17AqCrXq3vyKK1s",
authDomain: "smtyatto.firebaseapp.com",
databaseURL: "https://smtyatto-default-rtdb.firebaseio.com",
projectId: "smtyatto",
storageBucket: "smtyatto.firebasestorage.app",
messagingSenderId: "720432898013",
appId: "1:720432898013:web:3fc9bb90082235ab506034"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ===== 安定設定 ===== */
const ROOT = "smchat";

let uid = localStorage.getItem("uid");
if(!uid){
uid = crypto.randomUUID();
localStorage.setItem("uid",uid);
}

let name="名無し";
let isAdmin=false;
let room="main";

/* ===== 入室 ===== */
document.getElementById("loginBtn").onclick=()=>{

const pass=document.getElementById("pass").value;
name=document.getElementById("name").value||"名無し";

if(pass!=="MvLO"){
document.getElementById("err").innerText="パスワード違う";
return;
}

document.getElementById("login").style.display="none";
document.getElementById("layout").style.display="flex";

/* ユーザー登録 */
set(ref(db,`${ROOT}/users/${uid}`),{
name
});

listen();
};

/* ===== 管理者 ===== */
document.addEventListener("keydown",(e)=>{
if(e.key==="F2"){
const p=prompt("admin?");
if(p==="admin123") isAdmin=true;
}
});

/* ===== 送信（ここが超重要） ===== */
function send(){

const msg=document.getElementById("msg");
if(!msg.value) return;

push(ref(db,`${ROOT}/chat/${room}`),{
name,
text:msg.value,
time:Date.now(),
isAdmin
});

msg.value="";
}

/* ボタン */
document.getElementById("sendBtn").onclick=send;

/* Enter確実 */
document.getElementById("msg").addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
e.preventDefault();
send();
}
});

/* ===== 表示 ===== */
function listen(){

const box=document.getElementById("messages");

onChildAdded(ref(db,`${ROOT}/chat/${room}`),(snap)=>{

const d=snap.val();

const div=document.createElement("div");
div.className="msg";

div.innerHTML=`
<div class="name ${d.isAdmin ? "admin":""}">
${d.name}
</div>
<div>${d.text}</div>
`;

box.appendChild(div);
});
}

</script>

</body>
</html>
