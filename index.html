<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Firebaseテスト</title>
</head>
<body>

<h2>Firebaseテスト</h2>

<input id="text" placeholder="テスト入力">
<button id="send">送信</button>

<div id="log"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getDatabase,
ref,
push,
set,
onChildAdded
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* 🔥ここだけ自分のFirebase */
const app = initializeApp({
apiKey: "xxx",
authDomain: "xxx",
databaseURL: "https://smtyatto-default-rtdb.firebaseio.com",
projectId: "xxx"
});

const db = getDatabase(app);

/* 書き込み */
document.getElementById("send").onclick = () => {

const val = document.getElementById("text").value;
if(!val) return;

const r = push(ref(db,"test"));

set(r,{
text: val,
time: Date.now()
});

document.getElementById("text").value = "";

};

/* 読み込み */
onChildAdded(ref(db,"test"),(snap)=>{

const d = snap.val();

const div = document.createElement("div");
div.innerText = d.text;

document.getElementById("log").appendChild(div);

});

</script>

</body>
</html>
<script>
console.log("JS動いてる");
alert("動作テストOK");
</script>
