<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVLsmチャット</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#1e1f22;
color:white;
}

#layout{
display:flex;
height:100vh;
}

#sidebar{
width:220px;
background:#2b2d31;
padding:10px;
box-sizing:border-box;
}

#sidebar button{
width:100%;
margin:5px 0;
padding:8px;
border:none;
border-radius:5px;
background:#40444b;
color:white;
cursor:pointer;
}

#sidebar button:hover{
background:#5865f2;
}

input{
width:100%;
padding:8px;
margin-top:5px;
border-radius:5px;
border:none;
box-sizing:border-box;
}

#chatArea{
flex:1;
display:flex;
flex-direction:column;
background:#313338;
}

#top{
padding:10px;
background:#2b2d31;
font-size:14px;
}

#messages{
flex:1;
overflow-y:auto;
padding:10px;
}

#inputArea{
display:flex;
padding:10px;
background:#2b2d31;
}

#msg{
flex:1;
padding:10px;
border:none;
border-radius:5px;
outline:none;
}

button{
margin-top:5px;
padding:10px;
border:none;
border-radius:5px;
background:#5865f2;
color:white;
cursor:pointer;
}

#login{
max-width:300px;
margin:100px auto;
background:#2b2d31;
padding:20px;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<!-- 🔐 ログイン -->
<div id="login">
<h2>MVLsmチャット</h2>

<input id="name" placeholder="名前">
<input type="password" id="pass" placeholder="パスワード">
<button onclick="login()">入室</button>
<p id="error"></p>
</div>

<!-- 💬 本体 -->
<div id="layout" style="display:none;">

<div id="sidebar">
<h3>ROOM</h3>

<button onclick="switchRoom('general')">#general</button>
<button onclick="switchRoom('game')">#game</button>

<hr>

<input id="roomName" placeholder="部屋名">
<button onclick="createRoom()">部屋作成</button>

<hr>

<h4>管理者</h4>

<!-- 🔥 ここが今回のポイント -->
<input id="adminPass" placeholder="管理者パスワード">
<button onclick="adminLogin()">認証</button>

<input id="target" placeholder="対象ユーザー">
<button onclick="kickUser()">KICK</button>
<button onclick="banUser()">BAN</button>

</div>

<div id="chatArea">

<div id="top">
🟢 オンライン: <span id="online"></span>
</div>

<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="メッセージ">
<button onclick="sendMsg()">送信</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getDatabase,
ref,
set,
push,
onValue,
onChildAdded
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyARMFFYzOfZlptX72yn17AqCrXq3vyKK1s",
authDomain: "smtyatto.firebaseapp.com",
databaseURL: "https://smtyatto-default-rtdb.firebaseio.com",
projectId: "smtyatto",
storageBucket: "smtyatto.firebasestorage.app",
messagingSenderId: "720432898013",
appId: "1:720432898013:web:3fc9bb90082235ab506034"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let username = "名無し";
let currentRoom = "general";
let isAdmin = false;

/* 🔐 ログイン */
window.login = function(){

const pass = document.getElementById("pass").value;
username = document.getElementById("name").value || "名無し";

if(pass !== "MvLO"){
document.getElementById("error").innerText="パスワード違う";
return;
}

document.getElementById("login").style.display="none";
document.getElementById("layout").style.display="flex";

set(ref(db,"users/"+username),{
online:true
});

};

/* 🔑 管理者 */
window.adminLogin = function(){

const pass = document.getElementById("adminPass").value;

if(pass === "sm64はMvLOが好きだが弱すぎる人だった"){
isAdmin = true;
alert("管理者ON");
}else{
alert("違う");
}

};

/* 🏠 部屋 */
window.switchRoom = function(room){
currentRoom = room;
document.getElementById("messages").innerHTML="";
listenRoom();
};

window.createRoom = function(){
if(!isAdmin){
alert("管理者のみ");
return;
}

const name = document.getElementById("roomName").value;
if(!name) return;

switchRoom(name);
};

/* 💬 送信 */
window.sendMsg = function(){

const msg = document.getElementById("msg").value;
if(!msg) return;

push(ref(db,"chat/"+currentRoom),{
name:username,
text:msg,
time:Date.now()
});

document.getElementById("msg").value="";
};

/* 🚫 BAN */
window.banUser = function(){
if(!isAdmin) return;

const t = document.getElementById("target").value;
set(ref(db,"banned/"+t),true);
alert("BAN");
};

/* 👢 KICK */
window.kickUser = function(){
if(!isAdmin) return;

const t = document.getElementById("target").value;
if(t === username){
location.reload();
}
alert("KICK");
};

/* 📡 受信 */
function listenRoom(){

onChildAdded(ref(db,"chat/"+currentRoom),(snap)=>{
const d = snap.val();

const div = document.createElement("div");
div.innerHTML = "<b>"+d.name+"</b>: "+d.text;

document.getElementById("messages").appendChild(div);
});

}

listenRoom();

/* 🟢 オンライン */
onValue(ref(db,"users"),(snap)=>{
const data = snap.val() || {};

let list="";
Object.keys(data).forEach(u=>{
list += u+" ";
});

document.getElementById("online").innerText = list;
});

</script>

</body>
</html>
