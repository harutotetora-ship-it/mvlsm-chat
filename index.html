<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVLsmチャット</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#1e1f22;
color:white;
}

#layout{
display:flex;
height:100vh;
}

/* 左 */
#sidebar{
width:200px;
background:#2b2d31;
padding:10px;
box-sizing:border-box;
}

#sidebar button{
width:100%;
margin:5px 0;
padding:8px;
border:none;
border-radius:5px;
background:#40444b;
color:white;
cursor:pointer;
}

#sidebar button:hover{
background:#5865f2;
}

#sidebar input{
width:100%;
padding:6px;
margin-top:10px;
}

/* 右 */
#chatArea{
flex:1;
display:flex;
flex-direction:column;
background:#313338;
}

#topBar{
padding:10px;
background:#2b2d31;
font-size:14px;
}

#messages{
flex:1;
overflow-y:auto;
padding:10px;
}

#inputArea{
display:flex;
padding:10px;
background:#2b2d31;
}

#msg{
flex:1;
padding:10px;
border:none;
border-radius:5px;
outline:none;
}

button{
margin-left:5px;
padding:10px;
border:none;
border-radius:5px;
background:#5865f2;
color:white;
cursor:pointer;
}

#login{
max-width:300px;
margin:100px auto;
background:#2b2d31;
padding:20px;
border-radius:10px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}
</style>
</head>

<body>

<!-- 🔐 ログイン -->
<div id="login">
<h2>MVLsmチャット</h2>
<input id="name" placeholder="名前">
<input type="password" id="pass" placeholder="パスワード">
<button id="loginBtn">入室</button>
<p id="error"></p>
</div>

<!-- 💬 メイン -->
<div id="layout" style="display:none;">

<!-- 左 -->
<div id="sidebar">
<h3>ROOM</h3>

<button onclick="switchRoom('general')">#general</button>
<button onclick="switchRoom('game')">#game</button>
<button onclick="switchRoom('mvlsm')">#mvlsm</button>

<hr>

<!-- 🧑‍💼 管理者用 -->
<input id="roomName" placeholder="部屋名">
<button onclick="createRoom()">部屋作成</button>

</div>

<!-- 右 -->
<div id="chatArea">

<div id="topBar">
🟢 オンライン: <span id="online"></span>
</div>

<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="メッセージ">
<button id="sendBtn">送信</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getDatabase,
ref,
set,
push,
onValue,
onChildAdded,
onDisconnect
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyARMFFYzOfZlptX72yn17AqCrXq3vyKK1s",
authDomain: "smtyatto.firebaseapp.com",
databaseURL: "https://smtyatto-default-rtdb.firebaseio.com",
projectId: "smtyatto",
storageBucket: "smtyatto.firebasestorage.app",
messagingSenderId: "720432898013",
appId: "1:720432898013:web:3fc9bb90082235ab506034"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* =====================
   👤 ユーザー
===================== */
const userId = localStorage.getItem("uid") || crypto.randomUUID();
localStorage.setItem("uid", userId);

let username = "名無し";
let currentRoom = "general";
let users = {};

/* 🧑‍💼 管理者ID（ここ重要） */
const adminIds = [
  "あなたのuserIdをここに入れる"
];

function isAdmin(){
return adminIds.includes(userId);
}

/* =====================
   🔐 ログイン
===================== */
document.getElementById("loginBtn").onclick = () => {

const pass = document.getElementById("pass").value;
username = document.getElementById("name").value || "名無し";

if(pass !== "MvLO"){
document.getElementById("error").innerText="パスワード違う";
return;
}

document.getElementById("login").style.display="none";
document.getElementById("layout").style.display="flex";

/* ユーザー登録 */
set(ref(db,"users/"+userId),{
name: username,
online:true
});

const uref = ref(db,"users/"+userId);

set(uref,{
name:username,
online:true
});

onDisconnect(uref).set({
name:username,
online:false
});

};

/* =====================
   🏠 部屋切替
===================== */
window.switchRoom = function(room){

currentRoom = room;
document.getElementById("messages").innerHTML="";
listenRoom();

};

/* =====================
   ➕ 部屋作成（管理者のみ）
===================== */
window.createRoom = function(){

if(!isAdmin()){
alert("管理者のみ作成できます");
return;
}

const name = document.getElementById("roomName").value;
if(!name) return;

switchRoom(name);

const btn = document.createElement("button");
btn.innerText = "#"+name;
btn.onclick = ()=> switchRoom(name);

document.getElementById("sidebar").appendChild(btn);

document.getElementById("roomName").value="";

};

/* =====================
   💬 送信
===================== */
function sendMsg(){

const msg = document.getElementById("msg").value;
if(!msg) return;

push(ref(db,"chat/"+currentRoom),{
userId,
name:username,
text:msg,
time:Date.now()
});

document.getElementById("msg").value="";

}

document.getElementById("sendBtn").onclick = sendMsg;

document.getElementById("msg").addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
e.preventDefault();
sendMsg();
}
});

/* =====================
   👤 ユーザー
===================== */
onValue(ref(db,"users"),(snap)=>{
users = snap.val()||{};

let online="";
Object.keys(users).forEach(id=>{
if(users[id].online){
online += users[id].name+" ";
}
});

document.getElementById("online").innerText = online;
});

/* =====================
   💬 チャット受信
===================== */
function listenRoom(){

onChildAdded(ref(db,"chat/"+currentRoom),(snap)=>{

const d = snap.val();

const div = document.createElement("div");

div.innerHTML =
"<b>"+d.name+"</b>: "+d.text;

document.getElementById("messages").appendChild(div);

});

}

listenRoom();

</script>

</body>
</html>
