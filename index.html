<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getDatabase,
ref,
set,
push,
onValue,
onChildAdded,
onDisconnect,
off
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyARMFFYZOfZlptX72yn17AqCrXq3vyKK1s",
authDomain: "smtyatto.firebaseapp.com",
databaseURL: "https://smtyatto-default-rtdb.firebaseio.com",
projectId: "smtyatto",
storageBucket: "smtyatto.firebasestorage.app",
messagingSenderId: "720432898013",
appId: "1:720432898013:web:3fc9bb90082235ab506034"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ROOT="smchat";

let userId=localStorage.getItem("uid")||crypto.randomUUID();
localStorage.setItem("uid",userId);

let username="名無し";
let currentRoom="zatsudan";
let isAdmin=false;
let chatRef;

/* ===== 送信 ===== */
function sendMessage(){

const input=document.getElementById("msg");
if(!input.value) return;

push(ref(db,`${ROOT}/chat/${currentRoom}`),{
userId,
name:username,
text:input.value,
time:Date.now(),
isAdmin:isAdmin
});

input.value="";
}

/* ===== 初期化 ===== */
window.addEventListener("DOMContentLoaded",()=>{

document.getElementById("loginBtn").onclick=()=>{

const pass=document.getElementById("pass").value;
username=document.getElementById("name").value||"名無し";

if(pass!=="MvLO"){
document.getElementById("error").innerText="パスワードミス";
return;
}

document.getElementById("login").style.display="none";
document.getElementById("layout").style.display="flex";

/* ユーザー */
set(ref(db,`${ROOT}/users/${userId}`),{
name:username,
online:true,
isAdmin:false
});

onDisconnect(ref(db,`${ROOT}/users/${userId}`)).set({online:false});

/* 管理者状態反映 */
onValue(ref(db,`${ROOT}/users/${userId}`),(snap)=>{
const data=snap.val();
if(data?.isAdmin) isAdmin=true;
});

listenRoom();
};

/* 管理者ON */
document.getElementById("adminBtn").onclick=()=>{
const pass=prompt("管理者パスワード");

if(pass==="admin123"){
isAdmin=true;

/* Firebaseにも保存 */
set(ref(db,`${ROOT}/users/${userId}/isAdmin`),true);

alert("管理者ON（虹色表示有効）");
}else{
alert("違う");
}
};

/* 送信 */
document.getElementById("sendBtn").onclick=sendMessage;

/* Enter */
document.getElementById("msg").addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
e.preventDefault();
sendMessage();
}
});

});

/* ===== ルーム ===== */
window.switchRoom=function(room){
currentRoom=room;
document.getElementById("messages").innerHTML="";
if(chatRef) off(chatRef);
listenRoom();
};

/* ===== チャット ===== */
function listenRoom(){

chatRef=ref(db,`${ROOT}/chat/${currentRoom}`);

onChildAdded(chatRef,(snap)=>{

const d=snap.val();

const date=new Date(d.time||Date.now());
const time=date.getHours()+":"+String(date.getMinutes()).padStart(2,"0");

const div=document.createElement("div");
div.className="message";

div.innerHTML=`
<img class="avatar" src="https://via.placeholder.com/30">

<div class="bubbleWrap">

<div class="name ${d.isAdmin ? "admin" : ""}">
<b>${d.name}</b>
<span class="time">${time}</span>
</div>

<div class="bubble">${d.text}</div>

</div>
`;

document.getElementById("messages").appendChild(div);

});

}

/* ===== オンライン ===== */
onValue(ref(db,`${ROOT}/users`),(snap)=>{
const data=snap.val()||{};
let online="";
Object.values(data).forEach(u=>{
if(u.online) online+=u.name+" ";
});
document.getElementById("online").innerText=online;
});

</script>
