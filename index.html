<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVLsmチャット</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#1e1f22;
color:white;
}

#layout{
display:flex;
height:100vh;
}

#sidebar{
width:180px;
background:#2b2d31;
padding:10px;
}

#sidebar button{
width:100%;
margin:5px 0;
padding:8px;
border:none;
border-radius:5px;
background:#40444b;
color:white;
cursor:pointer;
}

#chatArea{
flex:1;
display:flex;
flex-direction:column;
background:#313338;
}

#topBar{
padding:10px;
background:#2b2d31;
font-size:14px;
}

#messages{
flex:1;
overflow-y:auto;
padding:10px;
}

.message{
margin:10px 0;
display:flex;
}

.avatar{
width:32px;
height:32px;
border-radius:50%;
margin:5px;
}

.bubbleWrap{
max-width:70%;
display:flex;
flex-direction:column;
}

.name{
font-size:12px;
color:#bbb;
margin-bottom:3px;
}

.time{
font-size:10px;
color:#888;
margin-left:5px;
}

.bubble{
background:#40444b;
padding:10px;
border-radius:10px;
word-break:break-word;
}

/* 管理者 */
.admin b{
background: linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet);
-webkit-background-clip:text;
color:transparent;
animation:rainbow 2s linear infinite;
}

@keyframes rainbow{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(360deg);}
}

/* 入力 */
#inputArea{
display:flex;
padding:10px;
background:#2b2d31;
}

#msg{
flex:1;
padding:10px;
border:none;
border-radius:5px;
outline:none;
}

button{
padding:10px;
margin-left:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

#sendBtn{
background:#5865f2;
color:white;
}

/* ログイン */
#login{
max-width:300px;
margin:100px auto;
background:#2b2d31;
padding:20px;
border-radius:10px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<div id="login">
<h2>MVLsmチャット</h2>
<input id="name" placeholder="名前">
<input type="password" id="pass" placeholder="パスワード">
<button id="loginBtn">入室</button>
<button id="adminBtn">管理者確認</button>
<p id="error"></p>
</div>

<div id="layout" style="display:none;">

<div id="sidebar">
<button onclick="switchRoom('zatsudan')">⭐ 雑談</button>
<button onclick="switchRoom('bug')">🐛 バグ</button>
<button onclick="switchRoom('update')">📢 更新</button>
</div>

<div id="chatArea">

<div id="topBar">
🟢 オンライン: <span id="online"></span>
</div>

<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="メッセージ">
<button id="sendBtn">送信</button>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getDatabase,
ref,
set,
push,
onValue,
onChildAdded,
onDisconnect,
remove,
off
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyARMFFYZOfZlptX72yn17AqCrXq3vyKK1s",
authDomain: "smtyatto.firebaseapp.com",
databaseURL: "https://smtyatto-default-rtdb.firebaseio.com",
projectId: "smtyatto",
storageBucket: "smtyatto.firebasestorage.app",
messagingSenderId: "720432898013",
appId: "1:720432898013:web:3fc9bb90082235ab506034"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* =====================
   状態
===================== */
let userId = localStorage.getItem("uid");
if(!userId){
userId = crypto.randomUUID();
localStorage.setItem("uid",userId);
}

let username="名無し";
let currentRoom="zatsudan";
let isAdmin=false;
let chatRef;

/* =====================
   DOM安全（超重要）
===================== */
window.addEventListener("DOMContentLoaded", () => {

/* 入室 */
document.getElementById("loginBtn").onclick = () => {

const pass = document.getElementById("pass").value;
username = document.getElementById("name").value || "名無し";

if(pass !== "MvLO"){
document.getElementById("error").innerText="パスワードミス";
return;
}

document.getElementById("login").style.display="none";
document.getElementById("layout").style.display="flex";

set(ref(db,"users/"+userId),{
name:username,
online:true
});

onDisconnect(ref(db,"users/"+userId)).set({online:false});

listenRoom();

};

/* 管理者 */
document.getElementById("adminBtn").onclick = () => {
const pass = prompt("管理者パスワード");

if(pass==="admin123"){
isAdmin=true;
alert("管理者ON");
}else{
alert("違う");
}
};

/* 送信 */
document.getElementById("sendBtn").onclick = sendMessage;

/* Enter確実 */
document.getElementById("msg").addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
e.preventDefault();
sendMessage();
}
});

});

/* =====================
   送信関数（統一）
===================== */
function sendMessage(){

const input=document.getElementById("msg");
const msg=input.value;

if(!msg) return;

push(ref(db,"chat/"+currentRoom),{
userId,
name:username,
text:msg,
time:Date.now()
});

input.value="";
}

/* =====================
   ルーム
===================== */
window.switchRoom=function(room){
currentRoom=room;
document.getElementById("messages").innerHTML="";
if(chatRef) off(chatRef);
listenRoom();
};

/* =====================
   チャット表示
===================== */
function listenRoom(){

chatRef=ref(db,"chat/"+currentRoom);

onChildAdded(chatRef,(snap)=>{

const d=snap.val();
const key=snap.key;

const date=new Date(d.time||Date.now());
const time=
date.getHours()+":"+String(date.getMinutes()).padStart(2,"0");

const div=document.createElement("div");
div.className="message";

div.innerHTML=`
<img class="avatar" src="https://via.placeholder.com/30">

<div class="bubbleWrap">

<div class="name ${isAdmin?'admin':''}">
<b>${d.name}</b>
<span class="time">${time}</span>
</div>

<div class="bubble">${d.text}</div>

<button class="deleteBtn">削除</button>

</div>
`;

/* 削除 */
div.querySelector(".deleteBtn").onclick=()=>{
remove(ref(db,"chat/"+currentRoom+"/"+key));
};

document.getElementById("messages").appendChild(div);

});

}

/* =====================
   オンライン
===================== */
onValue(ref(db,"users"),(snap)=>{
let online="";
const d=snap.val()||{};
Object.values(d).forEach(u=>{
if(u.online) online+=u.name+" ";
});
document.getElementById("online").innerText=online;
});

</script>

</body>
</html>
