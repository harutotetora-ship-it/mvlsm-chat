<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVLsmチャット</title>

<style>
body{
font-family:sans-serif;
background:#f5f5f5;
margin:0;
text-align:center;
}

#login,#chat{
max-width:500px;
margin:20px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin:5px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
background:#4caf50;
color:white;
border-radius:10px;
cursor:pointer;
}

#messages{
height:300px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
text-align:left;
background:#fafafa;
border-radius:10px;
}

#online{
font-size:14px;
color:green;
margin-bottom:10px;
}
</style>
</head>

<body>

<!-- 🔐 ログイン -->
<div id="login">
<h2>MVLsmチャット</h2>

<input id="name" placeholder="名前">
<br>
<input type="password" id="pass" placeholder="パスワード">
<br>
<button onclick="login()">入室</button>
<p id="error"></p>
</div>

<!-- 💬 チャット -->
<div id="chat" style="display:none;">

<h2>チャット</h2>

<div id="online"></div>

<!-- 🖼 アイコン -->
<input id="iconUrl" placeholder="アイコンURL">
<button onclick="setIcon()">アイコン設定</button>

<div id="messages"></div>

<input id="msg" placeholder="メッセージ">
<button onclick="sendMsg()">送信</button>

</div>

<!-- 🚀 Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getDatabase,
ref,
push,
set,
onValue
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyARMFFYzOfZlptX72yn17AqCrXq3vyKK1s",
authDomain: "smtyatto.firebaseapp.com",
databaseURL: "https://smtyatto-default-rtdb.firebaseio.com",
projectId: "smtyatto",
storageBucket: "smtyatto.firebasestorage.app",
messagingSenderId: "720432898013",
appId: "1:720432898013:web:3fc9bb90082235ab506034"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let username = "名無し";

// 🧠 アイコンキャッシュ（重要）
let iconCache = {};

// 🔐 ログイン
window.login = function(){
let pass = document.getElementById("pass").value;
username = document.getElementById("name").value || "名無し";

if(pass === "MvLO"){
document.getElementById("login").style.display="none";
document.getElementById("chat").style.display="block";

// デフォルトアイコン
set(ref(db,"icons/"+username), {
icon: "https://via.placeholder.com/30"
});

}else{
document.getElementById("error").innerText="パスワードが違います";
}
};

// 🖼 アイコン設定
window.setIcon = function(){
const url = document.getElementById("iconUrl").value;
if(!url) return;

set(ref(db,"icons/"+username), {
icon: url
});

alert("アイコン設定完了！");
};

// 💬 送信
window.sendMsg = function(){
let msg = document.getElementById("msg").value;
if(msg === "") return;

push(ref(db,"chat"),{
name: username,
text: msg,
time: Date.now()
});

document.getElementById("msg").value="";
};

// 🖼 アイコンをまとめて取得（キャッシュ）
onValue(ref(db,"icons"), (snap)=>{
iconCache = snap.val() || {};
});

// 💬 チャット表示（安定版）
onValue(ref(db,"chat"), (snap)=>{
let data = snap.val() || {};

let list = Object.values(data);

// 時間順
list.sort((a,b)=>a.time - b.time);

let box = document.getElementById("messages");
box.innerHTML = "";

list.forEach(d=>{

let icon = iconCache[d.name]?.icon
|| "https://via.placeholder.com/30";

let p = document.createElement("p");

p.innerHTML =
"<img src='"+icon+"' width='25' style='border-radius:50%'> " +
"<b>"+d.name+"</b>: "+d.text;

box.appendChild(p);

});

});

// 🟢 オンライン表示
onValue(ref(db,"icons"), (snap)=>{
let data = snap.val() || {};
let box = document.getElementById("online");

box.innerHTML = "🟢 オンライン: ";

Object.keys(data).forEach(name=>{
box.innerHTML += name + " ";
});
});

</script>

</body>
</html>
