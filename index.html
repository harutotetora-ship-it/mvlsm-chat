<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MVLsmデバッグ版</title>
</head>
<body>

<div id="messages"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getDatabase,
ref,
onChildAdded,
remove
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
apiKey:"xxx",
authDomain:"xxx",
databaseURL:"xxx",
projectId:"xxx"
});

const db = getDatabase(app);

/* チャット監視 */
const chatRef = ref(db,"chat/zatsudan");

onChildAdded(chatRef,(snap)=>{

const d = snap.val();
const key = snap.key;

/* 表示 */
const div = document.createElement("div");

div.innerHTML = `
<b>${d.name}</b>: ${d.text}
<button class="del">削除</button>
`;

document.getElementById("messages").appendChild(div);

/* 🧨削除デバッグ */
div.querySelector(".del").addEventListener("click",()=>{

console.log("===== 削除テスト =====");
console.log("key:", key);
console.log("path:", "chat/zatsudan/" + key);

/* 実際の削除 */
remove(ref(db,"chat/zatsudan/"+key))
.then(()=>{
console.log("✅ 削除成功");
alert("削除成功");
})
.catch((err)=>{
console.log("❌ 削除失敗");
console.error(err);
alert("削除失敗: " + err.message);
});

});

});

</script>

</body>
</html>
