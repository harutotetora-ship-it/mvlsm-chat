<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVLsmチャット</title>

<style>
body{
font-family:sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
text-align:center;
}

#login,#chat{
max-width:500px;
margin:30px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin:8px;
border:1px solid #ccc;
border-radius:10px;
}

button{
padding:10px 20px;
border:none;
background:#4caf50;
color:white;
border-radius:10px;
cursor:pointer;
}

#messages{
height:300px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
text-align:left;
margin-bottom:10px;
border-radius:10px;
background:#fafafa;
}
</style>
</head>

<body>

<!-- 🔐 ログイン -->
<div id="login">
<h1>MVLsmチャット</h1>
<input type="text" id="name" placeholder="名前（空なら名無し）"><br>
<input type="password" id="pass" placeholder="パスワード"><br>
<button onclick="login()">入室</button>
<p id="error"></p>
</div>

<!-- 💬 チャット -->
<div id="chat" style="display:none;">
<h2>MVLsmチャット</h2>

<div id="messages"></div>

<input type="text" id="msg" placeholder="メッセージ入力">
<button onclick="sendMsg()">送信</button>
</div>

<!-- 🚀 Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getDatabase,
ref,
push,
onChildAdded
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 Firebase設定
const firebaseConfig = {
apiKey: "AIzaSyARMFFYzOfZlptX72yn17AqCrXq3vyKK1s",
authDomain: "smtyatto.firebaseapp.com",
databaseURL: "https://smtyatto-default-rtdb.firebaseio.com",
projectId: "smtyatto",
storageBucket: "smtyatto.firebasestorage.app",
messagingSenderId: "720432898013",
appId: "1:720432898013:web:3fc9bb90082235ab506034",
measurementId: "G-2NJNZJ46K0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 👤 ユーザー名
let username = "名無し";

// 🔐 ログイン（そのまま残す）
window.login = function(){
let pass = document.getElementById("pass").value;
username = document.getElementById("name").value || "名無し";

if(pass === "MvLO"){
document.getElementById("login").style.display = "none";
document.getElementById("chat").style.display = "block";
}else{
document.getElementById("error").innerText = "パスワードが違います";
}
};

// 💬 送信（Firebase版）
window.sendMsg = function(){
let msg = document.getElementById("msg").value;
if(msg === "") return;

push(ref(db, "chat"), {
name: username,
text: msg,
time: Date.now()
});

document.getElementById("msg").value = "";
};

// 📡 受信（リアルタイム）
onChildAdded(ref(db, "chat"), (data) => {
let d = data.val();

let div = document.createElement("p");
div.innerHTML = "<b>" + d.name + "</b>: " + d.text;

document.getElementById("messages").appendChild(div);

let box = document.getElementById("messages");
box.scrollTop = box.scrollHeight;
});

</script>

</body>
</html>
