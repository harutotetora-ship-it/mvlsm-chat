<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVLsmチャット</title>

<style>
body{
font-family:sans-serif;
background:#f5f5f5;
margin:0;
text-align:center;
}

#login,#chat{
max-width:500px;
margin:20px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin:5px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
background:#4caf50;
color:white;
border-radius:10px;
cursor:pointer;
}

#messages{
height:300px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
text-align:left;
background:#fafafa;
border-radius:10px;
}

#online{
font-size:14px;
color:green;
margin-bottom:10px;
}
</style>
</head>

<body>

<!-- 🔐 ログイン -->
<div id="login">
<h2>MVLsmチャット</h2>

<input id="name" placeholder="名前">
<br>
<input type="password" id="pass" placeholder="パスワード">
<br>
<button id="loginBtn">入室</button>
<p id="error"></p>
</div>

<!-- 💬 チャット -->
<div id="chat" style="display:none;">

<h2>チャット</h2>

<div id="online"></div>

<input id="iconUrl" placeholder="アイコンURL">
<button id="iconBtn">アイコン設定</button>

<div id="messages"></div>

<input id="msg" placeholder="メッセージ">
<button id="sendBtn">送信</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getDatabase,
ref,
set,
push,
onValue,
onChildAdded,
onDisconnect
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyARMFFYzOfZlptX72yn17AqCrXq3vyKK1s",
authDomain: "smtyatto.firebaseapp.com",
databaseURL: "https://smtyatto-default-rtdb.firebaseio.com",
projectId: "smtyatto",
storageBucket: "smtyatto.firebasestorage.app",
messagingSenderId: "720432898013",
appId: "1:720432898013:web:3fc9bb90082235ab506034"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* =====================
   👤 ユーザーID（本体）
===================== */
const userId = crypto.randomUUID();
let username = "名無し";

/* キャッシュ */
let users = {};
let icons = {};

/* =====================
   🔐 ログイン
===================== */
document.getElementById("loginBtn").addEventListener("click", () => {

const pass = document.getElementById("pass").value;
username = document.getElementById("name").value || "名無し";

if(pass !== "MvLO"){
document.getElementById("error").innerText = "パスワードが違います";
return;
}

/* 画面切替 */
document.getElementById("login").style.display="none";
document.getElementById("chat").style.display="block";

/* 👤 ユーザー登録（ID管理） */
set(ref(db,"users/"+userId),{
name: username,
icon: "https://via.placeholder.com/30",
online: true
});

/* 🟢 オンライン管理 */
const statusRef = ref(db,"users/"+userId);

set(statusRef,{
name: username,
online: true,
time: Date.now()
});

onDisconnect(statusRef).set({
name: username,
online: false,
time: Date.now()
});

});

/* =====================
   🖼 アイコン設定
===================== */
document.getElementById("iconBtn").addEventListener("click", () => {

const url = document.getElementById("iconUrl").value;
if(!url) return;

set(ref(db,"users/"+userId+"/icon"), url);

alert("アイコン更新完了");

});

/* =====================
   💬 送信
===================== */
function sendMsg(){

const msg = document.getElementById("msg").value;
if(!msg) return;

push(ref(db,"chat"),{
userId: userId,
name: username,
text: msg,
time: Date.now()
});

document.getElementById("msg").value="";
}

document.getElementById("sendBtn").addEventListener("click", sendMsg);

/* Enter送信 */
document.getElementById("msg").addEventListener("keydown",(e)=>{
if(e.key === "Enter"){
e.preventDefault();
sendMsg();
}
});

/* =====================
   🧠 ユーザー情報キャッシュ
===================== */
onValue(ref(db,"users"), (snap)=>{
users = snap.val() || {};
});

/* =====================
   💬 チャット表示（ID基準）
===================== */
onChildAdded(ref(db,"chat"), (data)=>{

const d = data.val();

const u = users[d.userId];

const icon = u?.icon || "https://via.placeholder.com/30";
const name = d.name;

const p = document.createElement("p");

p.innerHTML =
"<img src='"+icon+"' width='25' style='border-radius:50%'> " +
"<b>"+name+"</b>: "+d.text;

document.getElementById("messages").appendChild(p);

});

/* =====================
   🟢 オンライン表示（完全修正版）
===================== */
onValue(ref(db,"users"), (snap)=>{

const data = snap.val() || {};
const box = document.getElementById("online");

box.innerHTML = "🟢 オンライン: ";

Object.keys(data).forEach(id=>{
if(data[id].online){
box.innerHTML += data[id].name + " ";
}
});

});

</script>

</body>
</html>
