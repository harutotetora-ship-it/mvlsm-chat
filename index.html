<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVLsmチャット</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#1e1f22;
color:white;
}

#layout{display:flex;height:100vh;}

#sidebar{
width:180px;
background:#2b2d31;
padding:10px;
}

#sidebar button{
width:100%;
margin:5px 0;
padding:8px;
border:none;
border-radius:5px;
background:#40444b;
color:white;
}

#chatArea{
flex:1;
display:flex;
flex-direction:column;
background:#313338;
}

#topBar{
padding:10px;
background:#2b2d31;
font-size:14px;
}

#messages{
flex:1;
overflow-y:auto;
padding:10px;
}

.message{margin:10px 0;}

.avatar{
width:32px;height:32px;border-radius:50%;
margin-right:8px;
}

.bubble{
background:#40444b;
padding:10px;
border-radius:10px;
display:inline-block;
}

.admin b{
background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet);
-webkit-background-clip:text;
color:transparent;
animation:rainbow 2s linear infinite;
}

@keyframes rainbow{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(360deg);}
}

#inputArea{
display:flex;
padding:10px;
background:#2b2d31;
}

#msg{
flex:1;
padding:10px;
border:none;
border-radius:5px;
outline:none;
}

#sendBtn{
margin-left:5px;
padding:10px;
border:none;
border-radius:5px;
background:#5865f2;
color:white;
}

#login{
max-width:300px;
margin:100px auto;
background:#2b2d31;
padding:20px;
border-radius:10px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<div id="login">
<h2>MVLsmチャット</h2>
<input id="name" placeholder="名前">
<input type="password" id="pass" placeholder="パスワード">
<button id="loginBtn">入室</button>
<button id="adminBtn">管理者確認</button>
<p id="error"></p>
</div>

<div id="layout" style="display:none;">

<div id="sidebar">
<button onclick="switchRoom('zatsudan')">⭐ 雑談</button>
<button onclick="switchRoom('bug')">🐛 バグ</button>
<button onclick="switchRoom('update')">📢 更新</button>
</div>

<div id="chatArea">

<div id="topBar">
🟢 オンライン: <span id="online"></span>
</div>

<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="メッセージ">
<button id="sendBtn">送信</button>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getDatabase,
ref,
set,
push,
onValue,
onChildAdded,
onDisconnect,
off
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyARMFFYZOfZlptX72yn17AqCrXq3vyKK1s",
authDomain: "smtyatto.firebaseapp.com",
databaseURL: "https://smtyatto-default-rtdb.firebaseio.com",
projectId: "smtyatto",
storageBucket: "smtyatto.firebasestorage.app",
messagingSenderId: "720432898013",
appId: "1:720432898013:web:3fc9bb90082235ab506034"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ROOT="smchat";

let userId=localStorage.getItem("uid")||crypto.randomUUID();
localStorage.setItem("uid",userId);

let username="名無し";
let currentRoom="zatsudan";
let isAdmin=false;
let chatRef;

/* ======================
   安全起動（ここ重要）
====================== */
window.addEventListener("DOMContentLoaded",()=>{

const loginBtn=document.getElementById("loginBtn");
const adminBtn=document.getElementById("adminBtn");
const sendBtn=document.getElementById("sendBtn");
const msg=document.getElementById("msg");

/* nullガード */
if(!loginBtn||!adminBtn||!sendBtn||!msg) return;

/* 入室 */
loginBtn.onclick=()=>{

const pass=document.getElementById("pass").value;
username=document.getElementById("name").value||"名無し";

if(pass!=="MvLO"){
document.getElementById("error").innerText="パスワードミス";
return;
}

document.getElementById("login").style.display="none";
document.getElementById("layout").style.display="flex";

set(ref(db,`${ROOT}/users/${userId}`),{
name:username,
online:true,
isAdmin:false
});

onDisconnect(ref(db,`${ROOT}/users/${userId}`)).set({online:false});

listenRoom();
};

/* 管理者 */
adminBtn.onclick=()=>{
const pass=prompt("管理者パスワード");
if(pass==="admin123"){
isAdmin=true;
alert("管理者ON");
}else{
alert("違う");
}
};

/* 送信 */
sendBtn.onclick=sendMessage;

/* Enter */
msg.addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
e.preventDefault();
sendMessage();
}
});

});

/* ======================
   送信
====================== */
function sendMessage(){

const input=document.getElementById("msg");
if(!input||!input.value) return;

push(ref(db,`${ROOT}/chat/${currentRoom}`),{
userId,
name:username,
text:input.value,
time:Date.now(),
isAdmin:isAdmin
});

input.value="";
}

/* ======================
   ルーム
====================== */
window.switchRoom=function(room){

currentRoom=room;

const m=document.getElementById("messages");
if(m) m.innerHTML="";

if(chatRef) off(chatRef);

listenRoom();
};

/* ======================
   チャット
====================== */
function listenRoom(){

chatRef=ref(db,`${ROOT}/chat/${currentRoom}`);

onChildAdded(chatRef,(snap)=>{

const d=snap.val();
if(!d) return;

const date=new Date(d.time||Date.now());
const time=date.getHours()+":"+String(date.getMinutes()).padStart(2,"0");

const div=document.createElement("div");
div.className="message";

div.innerHTML=`
<img class="avatar" src="https://via.placeholder.com/30">

<div>
<div class="${d.isAdmin ? "admin" : ""}">
<b>${d.name||"名無し"}</b>
<span style="font-size:10px;color:#888">${time}</span>
</div>

<div class="bubble">${d.text||""}</div>
</div>
`;

document.getElementById("messages")?.appendChild(div);

});
}

/* ======================
   オンライン
====================== */
onValue(ref(db,`${ROOT}/users`),(snap)=>{

const el=document.getElementById("online");
if(!el) return;

const data=snap.val()||{};
let online="";

Object.values(data).forEach(u=>{
if(u.online) online+=u.name+" ";
});

el.innerText=online;

});

</script>

</body>
</html>
