<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVLsmチャット</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#1e1f22;
color:white;
}

/* 全体 */
#layout{
display:flex;
height:100vh;
}

/* 左サイドバー */
#sidebar{
width:180px;
background:#2b2d31;
padding:10px;
box-sizing:border-box;
}

#sidebar h3{
margin:5px 0;
font-size:14px;
color:#aaa;
}

#sidebar button{
width:100%;
margin:5px 0;
padding:8px;
border:none;
border-radius:5px;
background:#40444b;
color:white;
cursor:pointer;
}

#sidebar button:hover{
background:#5865f2;
}

/* 右チャット */
#chatArea{
flex:1;
display:flex;
flex-direction:column;
background:#313338;
}

/* 上部 */
#topBar{
padding:10px;
background:#2b2d31;
font-size:14px;
}

/* メッセージ */
#messages{
flex:1;
overflow-y:auto;
padding:10px;
}

/* 入力 */
#inputArea{
display:flex;
padding:10px;
background:#2b2d31;
}

#msg{
flex:1;
padding:10px;
border:none;
border-radius:5px;
outline:none;
}

button{
margin-left:5px;
padding:10px;
border:none;
border-radius:5px;
background:#5865f2;
color:white;
cursor:pointer;
}

/* ログイン */
#login{
max-width:300px;
margin:100px auto;
background:#2b2d31;
padding:20px;
border-radius:10px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}
</style>
</head>

<body>

<!-- 🔐 ログイン -->
<div id="login">
<h2>MVLsmチャット</h2>
<input id="name" placeholder="名前">
<input type="password" id="pass" placeholder="パスワード">
<button id="loginBtn">入室</button>
<p id="error"></p>
</div>

<!-- 💬 チャット -->
<div id="layout" style="display:none;">

<!-- 左 -->
<div id="sidebar">
<h3>ROOM</h3>
<button onclick="switchRoom('バグ報告')">#general</button>
<button onclick="switchRoom('雑談')">#game</button>
<button onclick="switchRoom('mvl系')">#mvlsm</button>
</div>

<!-- 右 -->
<div id="chatArea">

<div id="topBar">
🟢 オンライン: <span id="online"></span>
</div>

<div id="messages"></div>

<div style="padding:5px;">
<input id="iconUrl" placeholder="アイコンURL">
<button id="iconBtn">アイコン</button>
</div>

<div id="inputArea">
<input id="msg" placeholder="メッセージ">
<button id="sendBtn">送信</button>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getDatabase,
ref,
set,
push,
onValue,
onChildAdded,
onDisconnect
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyARMFFYzOfZlptX72yn17AqCrXq3vyKK1s",
authDomain: "smtyatto.firebaseapp.com",
databaseURL: "https://smtyatto-default-rtdb.firebaseio.com",
projectId: "smtyatto",
storageBucket: "smtyatto.firebasestorage.app",
messagingSenderId: "720432898013",
appId: "1:720432898013:web:3fc9bb90082235ab506034"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* =====================
   👤 ユーザーID
===================== */
const userId = crypto.randomUUID();
let username = "名無し";

/* 🏠 部屋 */
let currentRoom = "general";
let users = {};

/* =====================
   🔐 ログイン
===================== */
document.getElementById("loginBtn").onclick = () => {

const pass = document.getElementById("pass").value;
username = document.getElementById("name").value || "名無し";

if(pass !== "MvLO"){
document.getElementById("error").innerText="パスワードミス";
return;
}

document.getElementById("login").style.display="none";
document.getElementById("layout").style.display="flex";

/* ユーザー登録 */
set(ref(db,"users/"+userId),{
name: username,
icon:"https://via.placeholder.com/30",
online:true
});

/* オンライン維持 */
const uref = ref(db,"users/"+userId);

set(uref,{
name:username,
online:true
});

onDisconnect(uref).set({
name:username,
online:false
});

};

/* =====================
   🏠 部屋切替
===================== */
window.switchRoom = function(room){

currentRoom = room;
document.getElementById("messages").innerHTML="";

listenRoom();

};

/* =====================
   🖼 アイコン
===================== */
document.getElementById("iconBtn").onclick = () => {

const url = document.getElementById("iconUrl").value;
if(!url) return;

set(ref(db,"users/"+userId+"/icon"),url);

};

/* =====================
   💬 送信
===================== */
function sendMsg(){

const msg = document.getElementById("msg").value;
if(!msg) return;

push(ref(db,"chat/"+currentRoom),{
userId,
name:username,
text:msg,
time:Date.now()
});

document.getElementById("msg").value="";

}

document.getElementById("sendBtn").onclick = sendMsg;

/* Enter送信 */
document.getElementById("msg").addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
e.preventDefault();
sendMsg();
}
});

/* =====================
   👤 ユーザー情報
===================== */
onValue(ref(db,"users"),(snap)=>{
users = snap.val()||{};

let online="";
Object.keys(users).forEach(id=>{
if(users[id].online){
online += users[id].name+" ";
}
});

document.getElementById("online").innerText = online;
});

/* =====================
   💬 チャット受信
===================== */
function listenRoom(){

onChildAdded(ref(db,"chat/"+currentRoom),(snap)=>{

const d = snap.val();
const u = users[d.userId];

const icon = u?.icon || "https://via.placeholder.com/30";

const div = document.createElement("div");
div.innerHTML =
"<img src='"+icon+"' width='20' style='border-radius:50%'> " +
"<b>"+d.name+"</b>: "+d.text;

document.getElementById("messages").appendChild(div);

});

}

/* 初期 */
listenRoom();

</script>

</body>
</html>
