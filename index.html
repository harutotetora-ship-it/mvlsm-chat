<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVLsmチャット</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#1e1f22;
color:white;
}

#layout{
display:flex;
height:100vh;
}

#sidebar{
width:180px;
background:#2b2d31;
padding:10px;
box-sizing:border-box;
}

#sidebar button{
width:100%;
margin:5px 0;
padding:8px;
border:none;
border-radius:5px;
background:#40444b;
color:white;
cursor:pointer;
}

#chatArea{
flex:1;
display:flex;
flex-direction:column;
background:#313338;
}

#topBar{
padding:10px;
background:#2b2d31;
font-size:14px;
}

#messages{
flex:1;
overflow-y:auto;
padding:10px;
}

/* メッセージ */
.message{
display:flex;
margin:10px 0;
align-items:flex-start;
}

.message.me{
flex-direction:row-reverse;
text-align:right;
}

.avatar{
width:32px;
height:32px;
border-radius:50%;
margin:5px;
}

.bubbleWrap{
max-width:70%;
display:flex;
flex-direction:column;
}

.name{
font-size:12px;
color:#bbb;
margin-bottom:3px;
}

.time{
font-size:10px;
color:#888;
margin-left:5px;
}

.bubble{
background:#40444b;
padding:10px;
border-radius:15px;
word-break:break-word;
}

.message.me .bubble{
background:#5865f2;
}

.replyBtn,.deleteBtn{
font-size:10px;
margin-top:4px;
background:none;
border:none;
color:#aaa;
cursor:pointer;
}

.replyBtn:hover,.deleteBtn:hover{
color:white;
}

/* 入力 */
#inputArea{
display:flex;
padding:10px;
background:#2b2d31;
}

#msg{
flex:1;
padding:10px;
border:none;
border-radius:5px;
outline:none;
}

button.send{
margin-left:5px;
padding:10px;
border:none;
border-radius:5px;
background:#5865f2;
color:white;
}

/* ログイン */
#login{
max-width:300px;
margin:100px auto;
background:#2b2d31;
padding:20px;
border-radius:10px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<div id="login">
<h2>MVLsmチャット</h2>
<input id="name" placeholder="名前">
<input type="password" id="pass" placeholder="パスワード">
<button id="loginBtn">入室</button>
<p id="error"></p>
</div>

<div id="layout" style="display:none;">

<div id="sidebar">
<button onclick="switchRoom('zatsudan')">⭐ 雑談</button>
<button onclick="switchRoom('bug')">🐛 バグ報告</button>
<button onclick="switchRoom('update')">📢 アップデート</button>
</div>

<div id="chatArea">

<div id="topBar">
🟢 オンライン: <span id="online"></span>
</div>

<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="メッセージ">
<button class="send" id="sendBtn">送信</button>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getDatabase,
ref,
set,
push,
onValue,
onChildAdded,
onDisconnect,
get,
child,
remove,
off
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyARMFFYZOfZlptX72yn17AqCrXq3vyKK1s",
authDomain: "smtyatto.firebaseapp.com",
databaseURL: "https://smtyatto-default-rtdb.firebaseio.com",
projectId: "smtyatto",
storageBucket: "smtyatto.firebasestorage.app",
messagingSenderId: "720432898013",
appId: "1:720432898013:web:3fc9bb90082235ab506034"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ======================
   トリップキー生成
====================== */
function makeTrip(){
return Math.random().toString(36).substring(2,8);
}

/* ======================
   ユーザー情報
====================== */
let userId;
let username = "名無し";
let tripKey;
let currentRoom = "zatsudan";
let chatRef;

/* ======================
   ログイン
====================== */
document.getElementById("loginBtn").onclick = async () => {

const pass = document.getElementById("pass").value;
username = document.getElementById("name").value || "名無し";

if(pass !== "MvLO"){
document.getElementById("error").innerText="パスワードミス";
return;
}

/* トリップ固定 */
tripKey = localStorage.getItem("tripKey");

if(!tripKey){
tripKey = makeTrip();
localStorage.setItem("tripKey",tripKey);
}

/* 復元チェック */
const snap = await get(child(ref(db),"tripUsers/"+tripKey));

if(snap.exists()){
userId = snap.val().userId;
}else{
userId = crypto.randomUUID();
set(ref(db,"tripUsers/"+tripKey),{
userId,
name:username,
trip:tripKey
});
}

/* ログイン完了 */
document.getElementById("login").style.display="none";
document.getElementById("layout").style.display="flex";

/* users登録 */
set(ref(db,"users/"+userId),{
name:username,
trip:tripKey,
icon:"https://via.placeholder.com/30",
online:true
});

onDisconnect(ref(db,"users/"+userId)).set({
online:false
});

listenRoom();

};

/* ======================
   送信
====================== */
document.getElementById("sendBtn").onclick = () => {

const msg = document.getElementById("msg").value;
if(!msg) return;

push(ref(db,"chat/"+currentRoom),{
userId,
name:username,
trip:tripKey,
text:msg,
time:Date.now()
});

document.getElementById("msg").value="";
};

/* ======================
   ルーム
====================== */
window.switchRoom = function(room){
currentRoom = room;
document.getElementById("messages").innerHTML="";
if(chatRef) off(chatRef);
listenRoom();
};

/* ======================
   チャット表示
====================== */
function listenRoom(){

chatRef = ref(db,"chat/"+currentRoom);

onChildAdded(chatRef,(snap)=>{

const d = snap.val();
const key = snap.key;

const isMe = d.userId === userId;

const date = new Date(d.time||Date.now());
const time =
date.getFullYear()+"/"+
String(date.getMonth()+1).padStart(2,"0")+"/"+
String(date.getDate()).padStart(2,"0")+" "+
String(date.getHours()).padStart(2,"0")+":"+
String(date.getMinutes()).padStart(2,"0");

const div = document.createElement("div");
div.className = "message"+(isMe?" me":"");

div.innerHTML = `
<img class="avatar" src="https://via.placeholder.com/30">

<div class="bubbleWrap">

<div class="name">
<b>${d.name}</b>
<span style="font-size:10px;color:#888">#${d.trip}</span>
<span class="time">${time}</span>
</div>

<div class="bubble">${d.text}</div>

<button class="replyBtn">返信</button>
<button class="deleteBtn">削除</button>

</div>
`;

/* 削除（全員OK） */
div.querySelector(".deleteBtn").onclick = () => {
remove(ref(db,"chat/"+currentRoom+"/"+key));
};

document.getElementById("messages").appendChild(div);

});

}

/* オンライン */
onValue(ref(db,"users"),(snap)=>{
let online="";
const data=snap.val()||{};
Object.values(data).forEach(u=>{
if(u.online) online+=u.name+" ";
});
document.getElementById("online").innerText=online;
});

</script>

</body>
</html>
